<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>branch-bench report</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; margin: 0; background: #0d1117; color: #e6edf3; }
  h1 { padding: 1rem 2rem; margin: 0; font-size: 1.2rem; background: #161b22; border-bottom: 1px solid #30363d; }
  .section { padding: 0.75rem 2rem 0.25rem; font-size: 0.75rem; color: #8b949e; letter-spacing: 0.08em; text-transform: uppercase; }
  .charts { display: flex; flex-wrap: wrap; gap: 1rem; padding: 0.5rem 2rem 1rem; }
  .chart-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; flex: 1 1 600px; min-width: 0; }
  .chart-title { font-size: 0.78rem; margin: 0 0 0.5rem; color: #8b949e; word-break: break-all; font-family: monospace; }
  table { width: calc(100% - 4rem); margin: 0 2rem 2rem; border-collapse: collapse; font-size: 0.82rem; }
  th, td { text-align: left; padding: 0.45rem 0.75rem; border-bottom: 1px solid #21262d; vertical-align: top; }
  th { background: #161b22; color: #8b949e; font-weight: 600; position: sticky; top: 0; z-index: 1; }
  tr.commit-row td { background: #0d1117; font-weight: 600; cursor: pointer; }
  tr.commit-row:hover td { background: #161b22; }
  tr.commit-row.pending td { color: #484f58; font-weight: 400; }
  tr.commit-row.in-progress td { background: #0f1d2e; }
  tr.commit-row.in-progress:hover td { background: #162030; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-spinner {
    display: inline-block; width: 0.7rem; height: 0.7rem;
    border: 2px solid #388bfd44; border-top-color: #388bfd;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 0.3rem;
  }
  tr.run-row td { background: #0d1117; padding: 0.6rem 0.75rem 0.6rem 2rem; font-size: 0.78rem; }
  tr.run-row.hidden { display: none; }
  .run-meta { color: #8b949e; margin-bottom: 0.4rem; }
  .cmd { font-family: monospace; font-size: 0.72rem; color: #58a6ff; word-break: break-all; margin: 0.2rem 0; }
  .pass { color: #3fb950; font-weight: 600; }
  .fail { color: #f85149; font-weight: 600; }
  .na { color: #484f58; }
  .score { font-family: monospace; font-size: 0.82rem; white-space: nowrap; }
  .score-err { color: #8b949e; font-size: 0.75rem; }
  .score-unit { color: #8b949e; font-size: 0.75rem; margin-left: 0.2rem; }
  .bench-score-label { color: #484f58; font-size: 0.7rem; font-family: monospace; }
  .toggle { font-size: 0.7rem; color: #388bfd; margin-left: 0.5rem; cursor: pointer; }
  .copy-sha {
    background: none; border: none; cursor: pointer; padding: 0 0.15rem;
    color: #484f58; font-size: 0.75rem; vertical-align: middle; line-height: 1;
    opacity: 0;
  }
  tr.commit-row:hover .copy-sha { opacity: 1; }
  .copy-sha:hover { color: #8b949e; }
  a { color: #58a6ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  /* ── Artifact badges ── */
  .artifact-grid { display: flex; flex-wrap: wrap; gap: 0.3rem 0.35rem; padding: 0.1rem 0; }
  .ab {
    display: inline-flex; align-items: center; gap: 0.28rem;
    padding: 0.22rem 0.55rem; border-radius: 5px;
    font-size: 0.7rem; font-family: monospace; font-weight: 500;
    text-decoration: none; line-height: 1.3; white-space: nowrap;
    border: 1px solid; transition: filter 0.12s, border-color 0.12s;
  }
  .ab:hover { filter: brightness(1.25); text-decoration: none; }
  .ab svg { flex-shrink: 0; }
  .ab-dir { font-size: 0.62rem; opacity: 0.65; margin-left: 0.05rem; }
  .ab-cpu   { color: #79c0ff; background: #162032; border-color: #388bfd55; }
  .ab-alloc { color: #7ee787; background: #0d2218; border-color: #3fb95055; }
  .ab-wall  { color: #e3b341; background: #2a1d00; border-color: #d2992255; }
  .ab-lock  { color: #ff7b72; background: #3d1210; border-color: #f8514955; }
  .ab-jfr   { color: #d2a8ff; background: #251e3a; border-color: #bc8cff55; }
  .ab-data  { color: #8b949e; background: #21262d; border-color: #30363d; }
  .ab-cpu:hover   { border-color: #388bfd; }
  .ab-alloc:hover { border-color: #3fb950; }
  .ab-wall:hover  { border-color: #d29922; }
  .ab-lock:hover  { border-color: #f85149; }
  .ab-jfr:hover   { border-color: #bc8cff; }
  .ab-data:hover  { border-color: #8b949e; }
  details { margin-top: 0.4rem; }
  summary {
    cursor: pointer; font-size: 0.72rem; color: #8b949e;
    list-style: none; display: flex; align-items: center; gap: 0.3rem;
  }
  summary::before { content: '▶'; font-size: 0.6rem; }
  details[open] summary::before { content: '▼'; }
  .mode-bar { padding: 0.25rem 2rem 0.5rem; display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
  .mode-label { font-size: 0.72rem; color: #8b949e; margin-right: 0.1rem; }
  .mode-sep { color: #30363d; margin: 0 0.3rem; }
  .mode-btn {
    background: #21262d; border: 1px solid #30363d; color: #8b949e;
    border-radius: 4px; padding: 0.2rem 0.7rem; font-size: 0.72rem; cursor: pointer;
  }
  .mode-btn.active { background: #388bfd22; border-color: #388bfd; color: #e6edf3; }
  .mode-btn:hover { border-color: #8b949e; }
  #runs-mode, #secondary-mode {
    background: #21262d; border: 1px solid #30363d; color: #e6edf3;
    border-radius: 4px; padding: 0.2rem 0.5rem; font-size: 0.72rem; cursor: pointer;
  }
  #runs-mode:focus, #secondary-mode:focus { outline: none; border-color: #388bfd; }
  #toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    background: #388bfd; color: #fff; padding: 0.4rem 1rem; border-radius: 6px;
    font-size: 0.8rem; font-family: monospace; opacity: 0; pointer-events: none;
    transition: opacity 0.15s;
  }
  #toast.show { opacity: 1; }
  pre.output {
    margin: 0.4rem 0 0;
    padding: 0.6rem 0.75rem;
    background: #010409;
    border: 1px solid #21262d;
    border-radius: 4px;
    font-size: 0.7rem;
    line-height: 1.5;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 400px;
    overflow-y: auto;
    color: #c9d1d9;
  }
  /* ── Top nav ── */
  .topnav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.25rem; min-height: 2.6rem;
    background: #010409; border-bottom: 1px solid #21262d;
    font-size: 0.78rem; position: sticky; top: 0; z-index: 10;
    flex-wrap: wrap; gap: 0.4rem 0;
  }
  .nav-left { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; padding: 0.4rem 0; }
  .nav-brand {
    font-weight: 700; font-size: 0.82rem; letter-spacing: -0.01em;
    color: #e6edf3; font-family: monospace;
  }
  .nav-sep { color: #30363d; }
  .epoch-picker { position: relative; }
  .epoch-btn {
    background: none; border: 1px solid #30363d; color: #8b949e;
    border-radius: 5px; padding: 0.18rem 0.55rem; font-size: 0.75rem;
    cursor: pointer; display: flex; align-items: center; gap: 0.3rem;
    white-space: nowrap;
  }
  .epoch-btn:hover { border-color: #8b949e; color: #e6edf3; }
  .epoch-btn .chevron { font-size: 0.6rem; opacity: 0.6; }
  .epoch-menu {
    position: absolute; top: calc(100% + 4px); left: 0;
    background: #161b22; border: 1px solid #30363d; border-radius: 6px;
    min-width: 11rem; box-shadow: 0 8px 24px rgba(0,0,0,.5);
    z-index: 20; overflow: hidden;
  }
  .epoch-menu.hidden { display: none; }
  .epoch-filter {
    width: 100%; background: #0d1117; border: none;
    border-bottom: 1px solid #21262d; color: #e6edf3;
    padding: 0.4rem 0.6rem; font-size: 0.75rem; outline: none;
    box-sizing: border-box;
  }
  .epoch-filter::placeholder { color: #484f58; }
  .epoch-list { list-style: none; margin: 0; padding: 0.25rem 0; max-height: 14rem; overflow-y: auto; }
  .epoch-list li a {
    display: block; padding: 0.3rem 0.75rem;
    color: #c9d1d9; text-decoration: none; font-size: 0.75rem;
  }
  .epoch-list li a:hover { background: #21262d; color: #e6edf3; }
  .epoch-list li.current a { color: #58a6ff; font-weight: 600; }
  .epoch-list li.hidden { display: none; }
  .nav-right { display: flex; align-items: center; padding: 0.4rem 0; }
  /* ── Benchmark group picker ── */
  .bench-picker { display: flex; align-items: center; gap: 0.3rem; flex-wrap: wrap; }
  .bench-btn {
    background: none; border: 1px solid #30363d; color: #8b949e;
    border-radius: 4px; padding: 0.15rem 0.5rem; font-size: 0.72rem;
    cursor: pointer; white-space: nowrap; font-family: monospace;
  }
  .bench-btn:hover { border-color: #8b949e; color: #e6edf3; }
  .bench-btn.active { background: #388bfd22; border-color: #388bfd; color: #e6edf3; }
  .nav-gh {
    display: flex; align-items: center; gap: 0.4rem;
    color: #484f58; text-decoration: none; font-size: 0.72rem;
    transition: color 0.15s;
  }
  .nav-gh:hover { color: #8b949e; }
  .nav-gh svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }
  /* ── Live log panel ── */
  #live-log { margin: 0 2rem 0.75rem; border: 1px solid #388bfd33; border-radius: 6px; overflow: hidden; display: none; }
  #live-log-hdr {
    padding: 0.35rem 0.75rem; background: #0f1d2e; border-bottom: 1px solid #388bfd22;
    font-size: 0.72rem; font-family: monospace; color: #388bfd;
    display: flex; align-items: center; gap: 0.4rem;
  }
  #live-log pre {
    margin: 0; padding: 0.5rem 0.75rem; background: #010409;
    font-size: 0.7rem; line-height: 1.5; color: #c9d1d9;
    max-height: 18rem; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
  }
</style>
</head>
<body>

<script>
{# ── Data injected from Python ── #}
const benchData            = {{ bench_json | safe }};
const commits              = {{ rows_json | safe }};
const githubUrl            = {{ github_url_json | safe }};
const secondaryMetricNames = {{ secondary_metric_names_json | safe }};
const benchGroups          = {{ bench_groups_json | safe }};
const currentEpoch         = {{ current_epoch }};
const epochLinks           = {{ epoch_links_json | safe }};

{% raw %}
// ── URL state ─────────────────────────────────────────────────────────────────
// State is persisted to query params (?mode=&runs=&sec=&bm=) + hash (#sha,sha).
// All readers tolerate missing/invalid values by falling back to defaults.
const _VALID_CHART_MODES = new Set(['mean','min','max','median','raw']);
const _VALID_RUNS_MODES  = new Set(['latest','all','aggregate']);

function _parseUrlState() {
  const sp = new URLSearchParams(location.search);
  const modeRaw = sp.get('mode') ?? '';
  const mode = _VALID_CHART_MODES.has(modeRaw) ? modeRaw : 'mean';
  const runsRaw = sp.get('runs') ?? '';
  const runs = _VALID_RUNS_MODES.has(runsRaw) || /^run_\d+$/.test(runsRaw) ? runsRaw : 'latest';
  const secRaw = sp.get('sec') ?? '';
  const sec = secondaryMetricNames.includes(secRaw) ? secRaw : '';
  const bmRaw = sp.get('bm') ?? '';
  const knownGroups = new Set(benchGroups.map(bg => bg.group));
  const bms = new Set(bmRaw.split(',').filter(b => b && knownGroups.has(b)));
  const shas = new Set(location.hash.slice(1).split(',').filter(Boolean));
  return { mode, runs, sec, bms, shas };
}

const { mode: _initMode, runs: _initRuns, sec: _initSec, bms: _initBms } = _parseUrlState();

// Populate secondary metric dropdown; hide overlay controls when no secondary metrics exist
(function() {
  const sel = document.getElementById('secondary-mode');
  for (const name of secondaryMetricNames) {
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = name;
    sel.appendChild(opt);
  }
  sel.value = _initSec; // restore from URL (no-op if not found)
  if (secondaryMetricNames.length === 0) {
    // Hide: preceding sep, preceding label, the select itself, and the following sep
    const nodes = [];
    let el = sel.previousElementSibling;
    if (el && el.classList.contains('mode-sep')) { nodes.push(el); el = el.previousElementSibling; }
    if (el && el.classList.contains('mode-label')) nodes.push(el);
    const next = sel.nextElementSibling;
    if (next && next.classList.contains('mode-sep')) nodes.push(next);
    nodes.push(sel);
    nodes.forEach(n => n.style.display = 'none');
  }
})();

// ── Benchmark group picker (multi-select) ─────────────────────────────────────
// Empty set = no filter = all groups visible.
const selectedBenchmarks = new Set(_initBms);

(function() {
  const picker = document.getElementById('benchPicker');
  if (benchGroups.length <= 1) {
    picker.style.display = 'none';
    document.getElementById('benchSep').style.display = 'none';
    return;
  }
  for (const bg of benchGroups) {
    const btn = document.createElement('button');
    btn.className = 'bench-btn';
    btn.dataset.group = bg.group;
    btn.title = bg.group; // full class name on hover
    btn.textContent = bg.display;
    btn.onclick = () => toggleBenchmark(bg.group);
    picker.appendChild(btn);
    // Highlight based on URL state (empty selection = show all = all highlighted).
    btn.classList.toggle('active', selectedBenchmarks.size === 0 || selectedBenchmarks.has(bg.group));
  }
})();

function toggleBenchmark(group) {
  if (selectedBenchmarks.has(group)) {
    selectedBenchmarks.delete(group);
  } else {
    selectedBenchmarks.add(group);
  }
  _applyBenchmarkFilter();
  pushUrlState();
}

function _applyBenchmarkFilter() {
  const none = selectedBenchmarks.size === 0; // empty = show all
  // Button highlight: active when selected (or when nothing selected, show all as active)
  document.querySelectorAll('.bench-btn').forEach(b => {
    b.classList.toggle('active', none || selectedBenchmarks.has(b.dataset.group));
  });
  // Chart cards
  document.querySelectorAll('.chart-card').forEach(card => {
    const show = none || selectedBenchmarks.has(card.dataset.benchGroup);
    card.style.display = show ? '' : 'none';
  });
  // Table score cells
  scoreUpdaters.forEach(fn => fn());
}

// ── Epoch picker ──────────────────────────────────────────────────────────────
(function() {
  const list = document.getElementById('epochList');
  for (const e of epochLinks) {
    const li = document.createElement('li');
    if (e.epoch === currentEpoch) li.className = 'current';
    li.innerHTML = `<a href="${esc(e.path)}">Epoch ${e.epoch}${e.epoch === currentEpoch ? ' ✓' : ''}</a>`;
    list.appendChild(li);
  }
  // Hide the button entirely when there is only one epoch
  if (epochLinks.length <= 1) {
    document.getElementById('epochPicker').style.display = 'none';
  }
})();

function toggleEpochMenu(e) {
  e.stopPropagation();
  const menu = document.getElementById('epochMenu');
  const hidden = menu.classList.toggle('hidden');
  if (!hidden) {
    const f = document.getElementById('epochFilter');
    f.value = '';
    filterEpochs('');
    f.focus();
  }
}

function filterEpochs(q) {
  const lower = q.toLowerCase();
  document.querySelectorAll('#epochList li').forEach(li => {
    li.classList.toggle('hidden', !li.textContent.toLowerCase().includes(lower));
  });
}

document.addEventListener('click', e => {
  if (!document.getElementById('epochPicker').contains(e.target)) {
    document.getElementById('epochMenu').classList.add('hidden');
  }
});

let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ── t-distribution 99% CI (two-tailed α=0.01) critical values ─────────────────
function tValue99(df) {
  if (df <= 0) return 63.657;
  const tbl = [
    [1,63.657],[2,9.925],[3,5.841],[4,4.604],[5,4.032],[6,3.707],[7,3.499],
    [8,3.355],[9,3.250],[10,3.169],[15,2.947],[20,2.845],[30,2.750],
    [60,2.660],[120,2.617],
  ];
  if (df >= 120) return 2.576;
  for (let i = tbl.length - 1; i >= 0; i--) {
    if (df >= tbl[i][0]) return tbl[i][1];
  }
  return 63.657;
}

function pooledStats(rawArrays) {
  const all = rawArrays.flat();
  if (all.length < 2) return null;
  const n = all.length;
  const mean = all.reduce((a, b) => a + b, 0) / n;
  const variance = all.reduce((a, v) => a + (v - mean) ** 2, 0) / (n - 1);
  const stderr = Math.sqrt(variance / n);
  return { mean, ci: tValue99(n - 1) * stderr, raw: all };
}

// ── Charts ────────────────────────────────────────────────────────────────────
let chartMode       = _initMode; // 'mean' | 'min' | 'max' | 'raw'
let runsMode        = _initRuns; // 'latest' | 'all' | 'aggregate' | 'run_N'
let secondaryMetric = _initSec;  // '' | metric name
const chartRenderers = []; // functions(errMode, runsMode, secMetric)

// Sync mode buttons to URL state (HTML defaults to 'mean' active)
document.querySelectorAll('.mode-btn').forEach(b =>
  b.classList.toggle('active', b.dataset.mode === chartMode));

const palette = ['#388bfd','#3fb950','#d29922','#f85149','#bc8cff','#39d353'];
const secColor = '#f0883e'; // distinct warm colour for secondary axis
const categoryArray = commits.map(c => c.message.substring(0, 40));
const layout = (unit, mode_label, secUnit) => {
  const hasSecondary = !!secUnit;
  return {
    paper_bgcolor: '#161b22', plot_bgcolor: '#161b22',
    font: { color: '#e6edf3', size: 11 },
    margin: { t: 10, r: hasSecondary ? 80 : 20, b: 220, l: 70 },
    xaxis: { tickangle: -55, gridcolor: '#21262d', color: '#8b949e', automargin: true,
              categoryorder: 'array', categoryarray: categoryArray },
    yaxis: { title: unit + ' (' + mode_label + ')', gridcolor: '#21262d', color: '#8b949e', rangemode: 'tozero' },
    ...(hasSecondary ? {
      yaxis2: {
        title: secUnit,
        overlaying: 'y', side: 'right',
        color: secColor, gridcolor: 'transparent',
        rangemode: 'tozero', showgrid: false,
      },
    } : {}),
    legend: { bgcolor: 'transparent', font: { size: 10 } },
    height: 520,
  };
};

const xOrder = new Map(categoryArray.map((x, i) => [x, i]));
function byCommitOrder(pts) {
  return [...pts].sort((a, b) => (xOrder.get(a.x) ?? Infinity) - (xOrder.get(b.x) ?? Infinity));
}

function resolveRunGroups(bd, rMode) {
  // Returns { label: string, pts: point[] }[]
  if (rMode === 'all') {
    const byIdx = {};
    for (const pt of bd.points) {
      (byIdx[pt.run_index] = byIdx[pt.run_index] || []).push(pt);
    }
    return Object.entries(byIdx).map(([ri, pts]) => ({
      label: 'run ' + (parseInt(ri) + 1), pts: byCommitOrder(pts),
    }));
  }
  if (rMode === 'latest') {
    const latestBySha = {};
    for (const pt of bd.points) {
      if (!latestBySha[pt.sha] || pt.run_index > latestBySha[pt.sha].run_index)
        latestBySha[pt.sha] = pt;
    }
    return [{ label: 'latest', pts: byCommitOrder(Object.values(latestBySha)) }];
  }
  if (rMode.startsWith('run_')) {
    const target = parseInt(rMode.slice(4));
    return [{ label: 'run ' + (target + 1), pts: byCommitOrder(bd.points.filter(p => p.run_index === target)) }];
  }
  if (rMode === 'aggregate') {
    const bySha = {};
    for (const pt of bd.points) {
      (bySha[pt.sha] = bySha[pt.sha] || []).push(pt);
    }
    const aggPts = Object.values(bySha).map(pts => {
      const stats = pooledStats(pts.map(p => p.raw || []));
      const ref = pts[pts.length - 1];
      // aggregate secondary metrics per metric name
      const secAgg = {};
      const secKeys = new Set(pts.flatMap(p => Object.keys(p.sec || {})));
      for (const k of secKeys) {
        const secStats = pooledStats(pts.map(p => (p.sec?.[k]?.raw) || []));
        if (secStats) secAgg[k] = { ...ref.sec?.[k], y: secStats.mean, error: secStats.ci, raw: secStats.raw };
        else secAgg[k] = ref.sec?.[k];
      }
      if (stats) {
        return { ...ref, y: stats.mean, error: stats.ci, raw: stats.raw, sec: secAgg };
      }
      const mean = pts.reduce((a, p) => a + p.y, 0) / pts.length;
      return { ...ref, y: mean, error: ref.error, raw: null, sec: secAgg };
    });
    return [{ label: 'aggregate', pts: byCommitOrder(aggPts) }];
  }
  return [{ label: 'all', pts: byCommitOrder(bd.points) }];
}

function buildTraces(bd, errMode, rMode, secMetric) {
  const groups = resolveRunGroups(bd, rMode);
  const traces = [];
  groups.forEach(({ label, pts }, gi) => {
    const color = palette[gi % palette.length];
    const hoverTmpl =
      '<b>%{customdata[1]}</b> %{x}<br>%{y:.4f} ' + bd.unit + '<br>' +
      '%{customdata[0]}<br>' +
      '<i style="font-size:0.75em;color:#8b949e">click to copy SHA</i>' +
      '<extra>' + label + '</extra>';

    const hasRaw = pts.some(p => p.raw && p.raw.length > 0);

    if (errMode === 'raw' && hasRaw) {
      const bx = [], by = [];
      for (const pt of pts) {
        if (pt.raw) { for (const v of pt.raw) { bx.push(pt.x); by.push(v); } }
        else { bx.push(pt.x); by.push(pt.y); }
      }
      traces.push({
        name: label, x: bx, y: by,
        type: 'box',
        marker: { color, size: 5, opacity: 0.8 },
        line: { color },
        fillcolor: color + '22',
        boxpoints: 'all', jitter: 0.4, pointpos: 0,
        boxmean: true, whiskerwidth: 0.6,
        hovertemplate: '%{x}<br>%{y:.4f} ' + bd.unit + '<extra>' + label + '</extra>',
      });
      return;
    }

    function pickY(p) {
      if (!p.raw || p.raw.length === 0) return p.y;
      if (errMode === 'min') return Math.min(...p.raw);
      if (errMode === 'max') return Math.max(...p.raw);
      if (errMode === 'median') {
        const s = [...p.raw].sort((a, b) => a - b);
        const m = Math.floor(s.length / 2);
        return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
      }
      return p.y;
    }

    const yVals = pts.map(pickY);

    let error_y;
    if (errMode === 'mean') {
      error_y = { type: 'data', array: pts.map(p => p.error), visible: true, color: color + '88' };
    } else {
      error_y = { visible: false };
    }

    traces.push({
      name: label,
      x: pts.map(p => p.x), y: yVals,
      error_y,
      customdata: pts.map(p => [p.run_at, p.short_sha]),
      type: 'scatter', mode: 'lines+markers',
      marker: { color, size: 7 },
      line: { color, dash: gi === 0 ? 'solid' : 'dot' },
      hovertemplate: hoverTmpl,
    });

    // Secondary metric overlay (only on first group to avoid duplication in 'all' mode)
    if (gi === 0 && secMetric) {
      const secPts = pts.filter(p => p.sec?.[secMetric] != null);
      if (secPts.length) {
        const sd = secPts.map(p => p.sec[secMetric]);
        traces.push({
          name: secMetric,
          x: secPts.map(p => p.x),
          y: sd.map(s => s.y),
          error_y: { type: 'data', array: sd.map(s => s.error || 0), visible: true, color: secColor + '88' },
          type: 'scatter', mode: 'lines+markers',
          marker: { color: secColor, size: 5, symbol: 'diamond' },
          line: { color: secColor, dash: 'dot', width: 1.5 },
          yaxis: 'y2',
          hovertemplate: '%{x}<br>%{y:.4g} ' + (bd.secUnits?.[secMetric] || '') + '<extra>' + secMetric + '</extra>',
        });
      }
    }
  });
  return traces;
}

const chartsDiv = document.getElementById('charts');
for (const [name, bd] of Object.entries(benchData)) {
  const card = document.createElement('div');
  card.className = 'chart-card';
  // Tag the card with its benchmark group so the picker can show/hide it.
  card.dataset.benchGroup = name.substring(0, name.lastIndexOf('.')) || name;
  const title = document.createElement('p');
  title.className = 'chart-title';
  title.textContent = name;
  card.appendChild(title);
  const plotDiv = document.createElement('div');
  card.appendChild(plotDiv);
  chartsDiv.appendChild(card);

  const render = (eMode, rMode, secM) => {
    const secUnit = secM ? (bd.secUnits?.[secM] || secM) : null;
    const layoutObj = layout(bd.unit, bd.mode, secUnit);
    // Preserve user zoom state across re-renders
    const fl = plotDiv._fullLayout;
    if (fl) {
      if (fl.xaxis && !fl.xaxis.autorange) layoutObj.xaxis.range = fl.xaxis.range.slice();
      if (fl.yaxis && !fl.yaxis.autorange) layoutObj.yaxis.range = fl.yaxis.range.slice();
    }
    Plotly.react(plotDiv, buildTraces(bd, eMode, rMode, secM), layoutObj, {responsive: true});
    plotDiv.removeAllListeners?.('plotly_click');
    plotDiv.on('plotly_click', data => {
      const pt = data.points[0];
      const sha = pt.customdata?.[1];
      if (!sha) return;
      navigator.clipboard.writeText(sha).then(() => showToast('Copied ' + sha));
    });
  };
  chartRenderers.push(render);
  render(chartMode, runsMode, secondaryMetric);
}

(function() {
  const maxIdx = Math.max(-1, ...Object.values(benchData).flatMap(bd => bd.points.map(p => p.run_index)));
  const sel = document.getElementById('runs-mode');
  for (let i = 0; i <= maxIdx; i++) {

function pushUrlState(shas) {
  if (shas === undefined) shas = new Set(location.hash.slice(1).split(',').filter(Boolean));
  const sp = new URLSearchParams();
  if (chartMode !== 'mean') sp.set('mode', chartMode);
  if (runsMode !== 'latest') sp.set('runs', runsMode);
  if (secondaryMetric) sp.set('sec', secondaryMetric);
  if (selectedBenchmarks.size > 0) sp.set('bm', [...selectedBenchmarks].join(','));
  const search = sp.toString() ? '?' + sp.toString() : '';
  const hash = shas.size ? '#' + [...shas].join(',') : '';
  history.pushState(null, '', search + hash || location.pathname);
}

function setChartMode(mode) {
  chartMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === mode));
  chartRenderers.forEach(r => r(mode, runsMode, secondaryMetric));
  pushUrlState();
}

function setRunsMode(val) {
  runsMode = val;
  chartRenderers.forEach(r => r(chartMode, val, secondaryMetric));
  scoreUpdaters.forEach(fn => fn());
  pushUrlState();
}

function setSecondaryMetric(val) {
  secondaryMetric = val;
  chartRenderers.forEach(r => r(chartMode, runsMode, val));
  pushUrlState();
}

// ── Score cell rendering (runs-mode aware) ────────────────────────────────────
const scoreUpdaters = [];

function benchGroupOf(name) {
  const idx = name.lastIndexOf('.');
  return idx >= 0 ? name.substring(0, idx) : name;
}

function renderScoreCell(td, c) {
  let scores;
  if (runsMode === 'all' || runsMode === 'latest') {
    scores = c.runs.length > 0 ? c.runs[c.runs.length - 1].scores : [];
  } else if (runsMode.startsWith('run_')) {
    const ri = parseInt(runsMode.slice(4));
    scores = ri < c.runs.length ? c.runs[ri].scores : [];
  } else if (runsMode === 'aggregate') {
    const byBench = {};
    for (const run of c.runs) {
      for (const s of run.scores) {
        (byBench[s.benchmark] = byBench[s.benchmark] || []).push(s);
      }
    }
    scores = Object.entries(byBench).map(([benchmark, arr]) => {
      const stats = pooledStats(arr.map(s => s.raw_data || []));
      if (stats) return { benchmark, score: stats.mean, score_error: stats.ci, unit: arr[0].unit };
      const mean = arr.reduce((a, s) => a + s.score, 0) / arr.length;
      return { benchmark, score: mean, score_error: null, unit: arr[0].unit };
    });
  } else {
    scores = [];
  }

  // Filter to the selected benchmark group(s).
  if (selectedBenchmarks.size > 0 && scores) {
    scores = scores.filter(s => selectedBenchmarks.has(benchGroupOf(s.benchmark)));
  }

  if (!scores || scores.length === 0) {
    td.innerHTML = '<span class="na">—</span>';
    return;
  }
  // Show a method-name label when more than one benchmark is visible, so it's
  // clear which score belongs to which class.
  const multiGroup = benchGroups.length > 1 && selectedBenchmarks.size !== 1;
  td.innerHTML = scores.map(s => {
    const scoreStr = s.score.toPrecision(6);
    const err = s.score_error != null
      ? ` <span class="score-err">± ${s.score_error.toPrecision(3)}</span>` : '';
    const unit = `<span class="score-unit">${esc(s.unit)}</span>`;
    const methodName = s.benchmark.substring(s.benchmark.lastIndexOf('.') + 1);
    const label = multiGroup
      ? `<span class="bench-score-label">${esc(methodName)}</span> `
      : '';
    return `<div class="score" title="${esc(s.benchmark)}">${label}${scoreStr}${err} ${unit}</div>`;
  }).join('');
}

function _artifactBadge(href, meta) {
  const dir = meta.dir ? `<span class="ab-dir">${meta.dir}</span>` : '';
  return `<a href="${esc(href)}" class="ab ${esc(meta.cls)}" title="${esc(meta.tip)}" target="_blank" rel="noopener">${_IC[meta.icon]}${esc(meta.label)}${dir}</a>`;
}

function _runArtifactsHtml(r) {
  const badges = r.profiles.map(p => {
    const meta = PROFILE_META[p.event] || { label: p.event, dir: '', cls: 'ab-data', icon: 'data', tip: p.event };
    return _artifactBadge(p.file_path, meta);
  }).join('');
  const jmh = r.jmh_json_path
    ? `<a href="${esc(r.jmh_json_path)}" class="ab ab-data" title="Raw JMH JSON results" target="_blank" rel="noopener">${_IC.data}JSON</a>`
    : '';
  return badges || jmh ? `<div class="artifact-grid">${badges}${jmh}</div>` : '';
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}


const tbody = document.getElementById('tbody');
const rowBySha = {};

for (const c of commits) {
  const runCount = c.runs.length;
  const isPending = runCount === 0;
  const isInProgress = !!c.in_progress;
  const commitTr = document.createElement('tr');
  commitTr.className = 'commit-row' + (isPending ? ' pending' : '') + (isInProgress ? ' in-progress' : '');
  commitTr.id = 'commit-' + c.short_sha;

  // Test cell
  let testCell = '<span class="na">—</span>';
  if (c.latest_test !== null && c.latest_test !== undefined) {
    testCell = c.latest_test.passed
      ? '<span class="pass">✓</span>'
      : '<span class="fail">✗</span>';
  }

  const runLabel = isPending
    ? '<span class="na">pending</span>'
    : `${runCount} run${runCount !== 1 ? 's' : ''} <span class="toggle">[expand]</span>`;

  const latestRun = c.runs.length > 0 ? c.runs[c.runs.length - 1] : null;
  const latestArtifactsHtml = latestRun ? _runArtifactsHtml(latestRun) : '';

  const shaLink = githubUrl
    ? `<a href="${githubUrl}/commit/${esc(c.sha)}" target="_blank" rel="noopener"
          title="View diff on GitHub" style="font-family:monospace;font-size:0.78rem"
          onclick="event.stopPropagation()">${esc(c.short_sha)}</a>`
    : `<code style="font-size:0.78rem">${esc(c.short_sha)}</code>`;
  const copyBtn = `<button class="copy-sha" title="Copy full SHA"
    onclick="event.stopPropagation();navigator.clipboard.writeText('${esc(c.sha)}').then(()=>showToast('Copied ${esc(c.short_sha)}'))"
    >⎘</button>`;
  const progressSpinner = isInProgress ? '<span class="progress-spinner"></span>' : '';
  commitTr.innerHTML = `
    <td style="white-space:nowrap">${progressSpinner}${shaLink} ${copyBtn}</td>
    <td>${esc(c.message.substring(0, 72))}</td>
    <td style="white-space:nowrap">${esc(c.ts)}</td>
    <td>${testCell}</td>
    <td></td>
    <td>${latestArtifactsHtml ? `<div class="commit-artifacts" style="margin-bottom:0.35rem">${latestArtifactsHtml}</div>` : ''}${runLabel}</td>
  `;
  tbody.appendChild(commitTr);

  // Score cell — populated dynamically via scoreUpdaters
  const scoreTd = commitTr.cells[4];
  renderScoreCell(scoreTd, c);
  scoreUpdaters.push(() => renderScoreCell(scoreTd, c));

  const runRows = [];
  for (const r of c.runs) {
    const testStatus = r.test === null
      ? '<span class="na">—</span>'
      : r.test.passed
        ? '<span class="pass">✓ pass</span>'
        : '<span class="fail">✗ fail</span>';

    const artifactsHtml = _runArtifactsHtml(r);

    const testOutputBlock = (r.test && r.test.output)
      ? `<details><summary>test output</summary><pre class="output">${esc(r.test.output)}</pre></details>`
      : '';

    const benchOutputBlock = r.bench_output
      ? `<details><summary>bench output</summary><pre class="output">${esc(r.bench_output)}</pre></details>`
      : '';

    const reusedBadge = r.reused_from_sha
      ? ` &nbsp;<span style="color:#8b949e;font-size:0.72rem" title="Results copied from identical tree">≡ ${esc(r.reused_from_sha)}</span>`
      : '';

    const tr = document.createElement('tr');
    tr.className = 'run-row hidden';
    tr.innerHTML = `
      <td colspan="3">
        <div class="run-meta">Run #${r.run_index} &nbsp;·&nbsp; ${esc(r.run_at)}${reusedBadge}</div>
        ${r.test_cmd ? '<div class="cmd">test: ' + esc(r.test_cmd) + '</div>' : ''}
        ${r.bench_cmd ? '<div class="cmd">bench: ' + esc(r.bench_cmd) + '</div>' : ''}
        ${testOutputBlock}
        ${benchOutputBlock}
      </td>
      <td>${testStatus}</td>
      <td></td>
      <td>${artifactsHtml}</td>
    `;
    tbody.appendChild(tr);
    runRows.push(tr);

    // Run-row bench cell: dynamic so it respects the benchmark group filter.
    const runBenchTd = tr.cells[2];
    function renderRunBenchCell() {
      let scores = r.scores;
      if (selectedBenchmarks.size > 0) {
        scores = scores.filter(s => selectedBenchmarks.has(benchGroupOf(s.benchmark)));
      }
      if (!scores || scores.length === 0) {
        runBenchTd.innerHTML = '<span class="na">—</span>';
        return;
      }
      const multiGroup = benchGroups.length > 1 && selectedBenchmarks.size !== 1;
      runBenchTd.innerHTML = scores.map(s => {
        const scoreStr = s.score.toPrecision(5);
        const methodName = s.benchmark.substring(s.benchmark.lastIndexOf('.') + 1);
        const label = multiGroup
          ? `<span class="bench-score-label">${esc(methodName)}</span> `
          : '';
        const unit = `<span class="score-unit">${esc(s.unit)}</span>`;
        return `<div class="score" title="${esc(s.benchmark)}">${label}${scoreStr} ${unit}</div>`;
      }).join('');
    }
    renderRunBenchCell();
    scoreUpdaters.push(renderRunBenchCell);
  }

  function setExpanded(expanded) {
    runRows.forEach(tr => tr.classList.toggle('hidden', !expanded));
    const toggle = commitTr.querySelector('.toggle');
    if (toggle) toggle.textContent = expanded ? '[collapse]' : '[expand]';
    const commitArts = commitTr.querySelector('.commit-artifacts');
    if (commitArts) commitArts.style.display = expanded ? 'none' : '';
  }

  rowBySha[c.short_sha] = setExpanded;

  commitTr.addEventListener('click', () => {
    // Don't toggle when the user is selecting text (e.g. copying the SHA)
    if (window.getSelection()?.toString()) return;
    const expanding = runRows[0]?.classList.contains('hidden');
    setExpanded(expanding);
    const shas = new Set(location.hash.slice(1).split(',').filter(Boolean));
    expanding ? shas.add(c.short_sha) : shas.delete(c.short_sha);
    pushUrlState(shas);
    if (expanding) commitTr.scrollIntoView({ block: 'nearest' });
  });
}

  const pre   = document.getElementById('live-log-pre');
  const spinner = panel.querySelector('.progress-spinner');
  let timer = null;
  let missCount = 0;

  function render() {
    const log = window.__runLog;
    if (!log || !log.length) { panel.style.display = 'none'; return; }
    panel.style.display = 'block';
    // Keep scroll pinned to bottom unless user has scrolled up
    const atBottom = pre.scrollHeight - pre.scrollTop <= pre.clientHeight + 4;
    pre.textContent = log.map(e => {
      const d = new Date(e.ts * 1000);
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      const ss = String(d.getSeconds()).padStart(2, '0');
      return `[${hh}:${mm}:${ss}] ${e.msg}`;
    }).join('\n');
    if (atBottom) pre.scrollTop = pre.scrollHeight;
  }

  function poll() {
    const old = document.getElementById('__rl');
    if (old) old.remove();
    window.__runLog = [];
    const s = document.createElement('script');
    s.id = '__rl';
    s.src = 'running.js?' + Date.now();
    s.onload = () => { missCount = 0; render(); };
    s.onerror = () => {
      panel.style.display = 'none';
      if (++missCount >= 3) stopPolling();
    };
    document.head.appendChild(s);
  }

  function startPolling() {
    if (!timer) timer = setInterval(poll, 2000);
  }

  function stopPolling() {
    clearInterval(timer); timer = null;
    if (spinner) spinner.style.animation = 'none';
  }

  // Initial render from the already-loaded script tag
  render();
  if (!commits.some(c => c.in_progress)) {
    if (spinner) spinner.style.animation = 'none';
  }

  // Poll only when a run is active; pause when tab is hidden
  if (commits.some(c => c.in_progress) || (window.__runLog && window.__runLog.length)) {
    startPolling();
  }
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) stopPolling();
    else if (commits.some(c => c.in_progress)) startPolling();
  });
})();

// Restore all URL state (including on back/forward navigation)
function applyUrlState() {
  const { mode, runs, sec, bms, shas } = _parseUrlState();
  chartMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === mode));
  runsMode = runs;
  const runsSel = document.getElementById('runs-mode');
  runsSel.value = runs;
  if (runsSel.value !== runs) runsMode = 'latest'; // run index no longer exists
  secondaryMetric = sec;
  document.getElementById('secondary-mode').value = sec;
  selectedBenchmarks.clear();
  for (const b of bms) selectedBenchmarks.add(b);
  _applyBenchmarkFilter(); // updates buttons, chart visibility, score cells
  chartRenderers.forEach(r => r(chartMode, runsMode, secondaryMetric));
  for (const [sha, fn] of Object.entries(rowBySha)) fn(shas.has(sha));
  if (shas.size) {
    const first = document.getElementById('commit-' + [...shas][0]);
    if (first) first.scrollIntoView({ block: 'center' });
  }
}
applyUrlState();
window.addEventListener('popstate', applyUrlState);
